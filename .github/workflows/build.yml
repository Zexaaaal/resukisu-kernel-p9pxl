name: Build ReSukiSU Kernel
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Installer les dépendances
        run: |
          sudo apt update && sudo apt install -y repo git-core curl bc bison flex libssl-dev make
      - name: Synchroniser les sources GKI Google
        run: |
          mkdir kernel && cd kernel
          git config --global user.name "Gilian"
          git config --global user.email "gilian@example.com"
          # On laisse la branche gérer le manifeste par défaut, ce qui évite l'erreur XML
          repo init -u https://android.googlesource.com/kernel/manifest -b common-android14-6.1 --depth=1
          repo sync -j$(nproc) -c --no-tags
      - name: Injecter et Patcher SuSFS v2.0.0 (Simonpunk)
        run: |
          git clone -b gki-android14-6.1 https://gitlab.com/simonpunk/susfs4ksu.git
          cd susfs4ksu

          if git rev-parse "refs/tags/v2.0.0" >/dev/null 2>&1; then
            TARGET_COMMIT="v2.0.0"
          else
            TARGET_COMMIT=$(git log --all --grep="2.0.0" -n 1 --format="%H")
            if [ -z "$TARGET_COMMIT" ]; then
              TARGET_COMMIT=$(git log -S "2.0.0" --format="%H" -n 1)
            fi
          fi

          echo "Commit/tag v2.0.0 utilisé : $TARGET_COMMIT"
          git checkout $TARGET_COMMIT

          cd ..
          cd kernel

          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-android14-6.1.patch ./common/
          cp -r ../susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp -r ../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/

          cd common
          # On ne bloque pas immédiatement sur un échec de patch
          patch -p1 < 50_add_susfs_in_gki-android14-6.1.patch || true

          # Affiche le détail du hunk qui a échoué pour diagnostic
          if [ -f fs/namespace.c.rej ]; then
            echo "===== CONTENU DU REJET : fs/namespace.c.rej ====="
            cat fs/namespace.c.rej
            echo "===== CONTEXTE ACTUEL AUTOUR DE LA LIGNE 32 ====="
            sed -n '1,45p' fs/namespace.c
            exit 1
          fi
      - name: Configurer le defconfig
        run: |
          echo "CONFIG_KSU=y" >> kernel/common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_RESUKISU=y" >> kernel/common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> kernel/common/arch/arm64/configs/gki_defconfig
          sed -i 's/build-timestamp = .*/build-timestamp = "Wed Jan 30 12:00:00 UTC 2025"/' kernel/common/init/Makefile
      - name: Compiler le Kernel GKI
        run: |
          cd kernel
          tools/bazel run //common:kernel_aarch64_dist
      - name: Téléverser le Kernel (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: ReSukiSU-Kernel-Image
          path: kernel/out/kernel_aarch64/dist/Image
